<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Grade Calculator</title>

    <link rel="stylesheet" href="student.css">

</head>

<body>

<div class="container">

<h1>🎓 Student Grade Calculator</h1>

<div class="input-box">

<label>Enter Marks (0 - 100)</label>

<input
type="number"
id="marks"
placeholder="Enter your marks">

</div>

<button onclick="checkGrade()">
Calculate Grade
</button>

<div class="result">

<h2 id="grade">Grade : -</h2>

<h3 id="percentage">Percentage : -</h3>

<p id="message"></p>

</div>

</div>

<script src="student.js"></script>

</body>

</html>
